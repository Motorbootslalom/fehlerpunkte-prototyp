# =====================================================================
# Beobachtungs-Positionen  (ORTS- und PERSONENABHÄNGIG)
# =====================================================================
# Bei einem Wettkampf wird ein bestimmter AUFBAU (Setup) genutzt - Standard ist
# "Alcatraz" (WKR sitzt hinten). Jeder Aufbau bündelt die genutzten Positionen
# (auch gemeinsame wie Zeit/Knoten). Nur die Tor-Positionen unterscheiden sich
# je Aufbau (Blickrichtung/Spaltenreihenfolge); die übrigen werden geteilt.
#
# Spalten-Typen (typ):
#   boje  - Punkte direkt eintragen (5, 10, 15 …); ein Disq-Buchstabe markiert
#           die Disqualifikation an dieser Stelle. sub = Unter-Spalten.
#   code  - Fehlercodes (Zahlen) aus dem verwiesenen Katalog; punkteSpalte
#   summe - berechnete Punkte-/Σ-Spalte     zeit - Zeiteingabe
#   disq  - Disqualifikations-Spalte          text - Freitext (breite)
#
# katalog:  Verweis auf fehlerpunkte.kataloge.<id>
# hinweis:  Verweis auf hinweise.<id> (unten) - oder direkter Text
# disq:     alle | keine | [A, B, G, …]   (nicht relevante ausblenden)
# bildDrehung: 0 | 90 | -90 | 180   (Bild um so viel Grad drehen)
# =====================================================================

# ---- Globale Bojen-Kürzel (an EINER Stelle umstellbar) -------------
# In "sub" und Hinweisen werden diese Tokens (als ganze Wörter) ersetzt.
# So wird aus "hin seiteA" -> "H R". Alternativen:
#   Hafen/Kai:    seiteA: H,  seiteB: K
#   Land/See:     seiteA: L,  seiteB: S
#   Rechts/Links: seiteA: R,  seiteB: L   (Standard)
bezeichnungen:
  hin: "H"           # 1. Zeichen: Hinfahrt
  rueck: "R"         # 1. Zeichen: Rückfahrt (R = Rückfahrt; "R R" = Rück + Rechts ist ok)
  seiteA: "R"        # 2. Zeichen: eine Bojen-Seite (Standard: Rechts)
  seiteB: "L"        # 2. Zeichen: andere Bojen-Seite (Standard: Links)
  seiteAlang: "Rechts"  # Langname (für den Hinweis-Text)
  seiteBlang: "Links"
  iahinweis: ""         # nur im Schema "Innen/Außen" mit Text gefüllt

# ---- Auf der Seite umschaltbare Beschriftung (Bojen-Seiten) ---------
# Wird eines gewählt, überschreiben seine tokens die bezeichnungen oben und
# alle Listen werden neu beschriftet. Das erste ist der Standard.
beschriftungen:
  - id: rl
    name: "Rechts / Links (R/L)"
    tokens: { seiteA: "R", seiteB: "L", seiteAlang: "Rechts", seiteBlang: "Links" }
  - id: ls
    name: "Land / See (L/S)"
    tokens: { seiteA: "L", seiteB: "S", seiteAlang: "Land", seiteBlang: "See" }
  - id: sl
    name: "See / Land (S/L)"
    tokens: { seiteA: "S", seiteB: "L", seiteAlang: "See", seiteBlang: "Land" }
  - id: kh
    name: "Kai / Hafen (K/H)"
    tokens: { seiteA: "K", seiteB: "H", seiteAlang: "Kai", seiteBlang: "Hafen" }
  - id: pfeile
    name: "Pfeile (→ / ←)"
    raeumlich: true   # Pfeile zeigen eine Bildrichtung → an "von hinten"-Positionen spiegeln
    tokens: { seiteA: "→", seiteB: "←", seiteAlang: "Rechts", seiteBlang: "Links" }
  # Innen/Außen ist TOR-relativ: die Tore 1-4 tragen ihre innen/aussen-Kürzel
  # (aus der `innen`-Markierung der Spalten), Tor 5/Start/Ziel bleiben bei R/L.
  - id: ia
    name: "Innen / Außen (I/A)"
    tokens:
      seiteA: "R"
      seiteB: "L"
      seiteAlang: "Rechts"
      seiteBlang: "Links"
      innen: "I"
      aussen: "A"
      iahinweis: "Tore 1-4: I = Innen, A = Außen (statt R/L; Tor 5/Start/Ziel bleiben R/L)"

# ---- Wiederverwendbare Hinweise (Bojen-Bezeichnungen) --------------
hinweise:
  blickrichtung: |-
    Bojen-Bezeichnung (eindeutig):
    1. Zeichen = Fahrtrichtung: hin = Hinfahrt, rueck = Rückfahrt
    2. Zeichen = Seite: seiteA = seiteAlang, seiteB = seiteBlang
    iahinweis
    Start = Berührung Einfahrt-Bojentor · Ziel = Berührung Ausfahrt-Bojentor
    Fehler: pro berührter Boje (auch außerhalb des Manövers) = 5
  knoten: "Fehler: 5 pro fehlerhafter Knoten"
  parcours: "Es ist nur der eigentliche Fahrweg zu beobachten - keine Bojenberührungen!"

# ---- Aufbauten (Setups) - der erste ist der Standard ---------------
aufbauten:
  - id: alcatraz
    name: Alcatraz
    positionen: [zeit, steg, gate135, gate245, tor5, mueb, parcours, knoten]
  - id: frontal
    name: Frontal
    positionen: [zeit, steg, frontal135, frontal245, tor5, mueb, parcours, knoten]
  - id: berlin
    name: Berlin
    positionen: [steg, bstartziel, brechts, blinks]
  - id: parallel
    name: Parallelslalom
    positionen: [zeit, steg, parallelparcours]
# ---- Positionen (von den Aufbauten per ID referenziert) ------------
positionen:
  # === Gemeinsame Positionen (in jedem Aufbau gleich) ===
  - id: zeit
    titel: "Zeit"
    menue: "Zeitnahme"
    ausrichtung: hoch
    spalten:
      - { key: zeit1, label: "Zeit 1", typ: zeit }
      - { key: zeit2, label: "Zeit 2", typ: zeit }
      - { key: zeit3, label: "Zeit 3", typ: zeit }

  - id: steg
    titel: "Steg"
    menue: "Steg (Ablegen / Anlegen)"
    ausrichtung: hoch
    disq: alle
    # Zwei getrennte Fehler-Spalten mit je eigenem Katalog (per-Spalte statt
    # position-weit). Jede Spalte lässt nur ihre Codes + Disqualifikationen zu.
    spalten:
      - { key: fehlerAB, label: "Fehler AB", typ: code, punkteSpalte: fpab, katalog: stegAblegen, breite: 1 }
      - { key: fpab, label: "F-Pkt. AB", typ: summe }
      - { key: fehlerAN, label: "Fehler AN", typ: code, punkteSpalte: fpan, katalog: stegAnlegen, breite: 1 }
      - { key: fpan, label: "F-Pkt. AN", typ: summe }
      - { key: disq, label: "Disq.", typ: disq }
      - { key: bemerkung, label: "Bemerkung", typ: text, breite: 2 }

  - id: tor5
    titel: "Tor 5"
    menue: "Tor 5 (Einfahrt + Parcoursüberwachung)"
    ausrichtung: hoch
    bild: alcatraz_Parcours
    summeSpalte: sum
    disq: alle
    katalog: tor5
    spalten:
      - { key: fehler, label: "Fehler", typ: code, punkteSpalte: sum, breite: 1 }
      - { key: sum, label: "Σ", typ: summe }
      - { key: disq, label: "Disq.", typ: disq }
      - { key: bemerkung, label: "Bemerkung", typ: text, breite: 3 }

  - id: mueb
    titel: "Mann-über-Bord"
    menue: "Mann-über-Bord / Schikane"
    ausrichtung: hoch
    summeSpalte: sum
    disq: alle
    katalog: mueb
    spalten:
      - { key: fehler, label: "Fehler", typ: code, punkteSpalte: fp, breite: 1 }
      - { key: fp, label: "Fehlerpunkte", typ: summe }
      - { key: sum, label: "Σ", typ: summe }
      - { key: disq, label: "Disq.", typ: disq }
      - { key: bemerkung, label: "Bemerkung", typ: text, breite: 3 }

  - id: parcours
    titel: "Parcours"
    menue: "Parcours einfach (nur Fahrweg)"
    ausrichtung: hoch
    bild: alcatraz_Parcours
    disq: alle
    hinweis: parcours
    spalten:
      - { key: bemerkung, label: "Bemerkung", typ: text, breite: 4 }
      - { key: disq, label: "Disq.", typ: disq }

  - id: knoten
    titel: "Knoten"
    menue: "Knoten"
    ausrichtung: quer
    lauf: false          # Knoten werden nur einmal abgenommen (kein Lauf)
    summeSpalte: sum
    hinweis: knoten
    spalten:
      - { key: webleinstek, label: "Webleinstek", typ: boje, breite: 1 }
      - { key: schotstek, label: "Schotstek", typ: boje, breite: 1 }
      - { key: palstek, label: "Palstek", typ: boje, breite: 1 }
      - { key: kreuzknoten, label: "Kreuzknoten", typ: boje, breite: 1 }
      - { key: klampe, label: "Klampe", typ: boje, breite: 1 }
      - { key: stern, label: "*", typ: boje, breite: 1 }
      - { key: sum, label: "Σ", typ: summe }

  # === Aufbau ALCATRAZ: Tor-Positionen (Bild um 90° gedreht) ===
  - id: gate135
    titel: "Tor 1 / 3 / 5"
    menue: "Tore 1 / 3 / 5"
    ausrichtung: hoch
    bild: alcatraz_I
    bildDrehung: 90
    pfeileSpiegeln: true   # Alcatraz = Blick von hinten (Pfeile spiegeln)
    summeSpalte: sum
    disq: alle
    hinweis: blickrichtung
    spalten:
      - { key: start, label: "Start", typ: boje, sub: ["hin seiteA"] }
      - { key: t1a, label: "Tor 1", typ: boje, sub: ["hin seiteA", "hin seiteB"], innen: seiteB }
      - { key: t3a, label: "Tor 3", typ: boje, sub: ["hin seiteA", "hin seiteB"], innen: seiteB }
      - { key: t5, label: "Tor 5", typ: boje, sub: ["hin seiteA", "rueck seiteA"] }
      - { key: t3b, label: "Tor 3", typ: boje, sub: ["rueck seiteA", "rueck seiteB"], innen: seiteB }
      - { key: t1b, label: "Tor 1", typ: boje, sub: ["rueck seiteA", "rueck seiteB"], innen: seiteB }
      - { key: ziel, label: "Ziel", typ: boje, sub: ["rueck seiteA"] }
      - { key: disq, label: "Disq.", typ: disq }
      - { key: sum, label: "Σ", typ: summe }

  - id: gate245
    titel: "Tor 2 / 4 / 5"
    menue: "Tore 2 / 4 / 5"
    ausrichtung: hoch
    bild: alcatraz_II
    bildDrehung: 90
    pfeileSpiegeln: true   # Alcatraz = Blick von hinten (Pfeile spiegeln)
    summeSpalte: sum
    disq: alle
    hinweis: blickrichtung
    spalten:
      - { key: start, label: "Start", typ: boje, sub: ["hin seiteB"] }
      - { key: t2a, label: "Tor 2", typ: boje, sub: ["hin seiteA", "hin seiteB"], innen: seiteA }
      - { key: t4a, label: "Tor 4", typ: boje, sub: ["hin seiteA", "hin seiteB"], innen: seiteA }
      - { key: t5, label: "Tor 5", typ: boje, sub: ["hin seiteB", "rueck seiteB"] }
      - { key: t4b, label: "Tor 4", typ: boje, sub: ["rueck seiteA", "rueck seiteB"], innen: seiteA }
      - { key: t2b, label: "Tor 2", typ: boje, sub: ["rueck seiteA", "rueck seiteB"], innen: seiteA }
      - { key: ziel, label: "Ziel", typ: boje, sub: ["rueck seiteB"] }
      - { key: disq, label: "Disq.", typ: disq }
      - { key: sum, label: "Σ", typ: summe }

  # === Aufbau FRONTAL: Tor-Positionen (Blick von vorne, ungedreht) ===
  # Gleiche Bojen, aber andere Spaltenreihenfolge; reduzierte Disqualifikationen.
  - id: frontal135
    titel: "Tor 1 / 3 / 5"
    menue: "Tore 1 / 3 / 5 (frontal)"
    ausrichtung: hoch
    bild: alcatraz_I
    bildDrehung: -90   # wie Alcatraz (90°), aber vom Gegenüber → +180° = -90° (Hochformat)
    summeSpalte: sum
    disq: alle
    hinweis: blickrichtung
    spalten:
      - { key: start, label: "Start", typ: boje, sub: ["hin seiteB"] }
      - { key: t1a, label: "Tor 1", typ: boje, sub: ["hin seiteB", "hin seiteA"], innen: seiteB }
      - { key: t3a, label: "Tor 3", typ: boje, sub: ["hin seiteB", "hin seiteA"], innen: seiteB }
      - { key: t5, label: "Tor 5", typ: boje, sub: ["rueck seiteA", "hin seiteA"] }
      - { key: t3b, label: "Tor 3", typ: boje, sub: ["rueck seiteB", "rueck seiteA"], innen: seiteB }
      - { key: t1b, label: "Tor 1", typ: boje, sub: ["rueck seiteB", "rueck seiteA"], innen: seiteB }
      - { key: ziel, label: "Ziel", typ: boje, sub: ["rueck seiteB"] }
      - { key: disq, label: "Disq.", typ: disq }
      - { key: sum, label: "Σ", typ: summe }

  - id: frontal245
    titel: "Tor 2 / 4 / 5"
    menue: "Tore 2 / 4 / 5 (frontal)"
    ausrichtung: hoch
    bild: alcatraz_II
    bildDrehung: -90   # wie Alcatraz (90°), aber vom Gegenüber → +180° = -90° (Hochformat)
    summeSpalte: sum
    disq: alle
    hinweis: blickrichtung
    spalten:
      - { key: start, label: "Start", typ: boje, sub: ["hin seiteB"] }
      - { key: t2a, label: "Tor 2", typ: boje, sub: ["hin seiteB", "hin seiteA"], innen: seiteA }
      - { key: t4a, label: "Tor 4", typ: boje, sub: ["hin seiteB", "hin seiteA"], innen: seiteA }
      - { key: t5, label: "Tor 5", typ: boje, sub: ["rueck seiteB", "hin seiteB"] }
      - { key: t4b, label: "Tor 4", typ: boje, sub: ["rueck seiteB", "rueck seiteA"], innen: seiteA }
      - { key: t2b, label: "Tor 2", typ: boje, sub: ["rueck seiteB", "rueck seiteA"], innen: seiteA }
      - { key: ziel, label: "Ziel", typ: boje, sub: ["rueck seiteB"] }
      - { key: disq, label: "Disq.", typ: disq }
      - { key: sum, label: "Σ", typ: summe }

  - id: parallelparcours
    titel: "Parallelslalom"
    menue: "Parallelslalom (nur Fahrweg)"
    disq: alle
    spalten:
      - { key: start, label: "Start", typ: boje, sub: ["seiteB seiteA"] }
      - { key: b1a, label: "Boje 1", typ: boje }
      - { key: b2a, label: "Boje 2", typ: boje }
      - { key: b3a, label: "Boje 3", typ: boje }
      - { key: b4a, label: "Boje 4", typ: boje }
      - { key: b5, label: "Boje 5", typ: boje }
      - { key: b4b, label: "Boje 4", typ: boje }
      - { key: b3b, label: "Boje 3", typ: boje }
      - { key: b2b, label: "Boje 2", typ: boje }
      - { key: b1b, label: "Boje 1", typ: boje }
      - { key: ziel, label: "Ziel", typ: boje, sub: ["seiteB seiteA"] }
      - { key: disq, label: "Disq.", typ: disq }

  # === Aufbau BERLIN: vier feste WKR-Positionen rund um den Kurs ===
  # Andere Zusammenstellung (z. B. Berlin): jede Position zeigt das GANZE
  # Parcoursbild mit allen Toren. Entwurf - Spalten/Bojen bitte prüfen.
  - id: bstartziel
    titel: "Start/Ziel"
    menue: "Start/Ziel (Zeitnahme + Start-/Zieltor-Bojen)"
    ausrichtung: hoch
    bild: alcatraz_Parcours
    summeSpalte: sum
    disq: alle
    hinweis: blickrichtung
    spalten:
      - { key: zeit1, label: "Zeit 1", typ: zeit }
      - { key: zeit2, label: "Zeit 2", typ: zeit }
      - { key: zeit3, label: "Zeit 3", typ: zeit }
      - { key: start, label: "Start", typ: boje, sub: ["hin seiteA", "hin seiteB"] }
      - { key: ziel, label: "Ziel", typ: boje, sub: ["rueck seiteA", "rueck seiteB"] }
      - { key: disq, label: "Disq.", typ: disq }
      - { key: sum, label: "Σ", typ: summe }

  - id: brechts
    titel: "Rechts"
    menue: "Rechts (Tor 1 / 3 + Mann-über-Bord)"
    ausrichtung: hoch
    bild: alcatraz_Parcours
    summeSpalte: sum
    disq: alle
    katalog: mueb
    hinweis: blickrichtung
    spalten:
      - { key: t1a, label: "Tor 1", typ: boje, sub: ["hin seiteA", "hin seiteB"] }
      - { key: t3a, label: "Tor 3", typ: boje, sub: ["hin seiteA", "hin seiteB"] }
      - { key: t3b, label: "Tor 3", typ: boje, sub: ["rueck seiteA", "rueck seiteB"] }
      - { key: t1b, label: "Tor 1", typ: boje, sub: ["rueck seiteA", "rueck seiteB"] }
      # Mann-über-Bord erst ab Klasse 4.
      - { key: mueb, label: "MüB", typ: code, punkteSpalte: mp, breite: 1, klassen: [4, 5, 6, 7] }
      - { key: mp, label: "MüB-Pkt.", typ: summe, klassen: [4, 5, 6, 7] }
      - { key: disq, label: "Disq.", typ: disq }
      - { key: sum, label: "Σ", typ: summe }

  - id: blinks
    titel: "Links"
    menue: "Links (Tor 2 / 4 / 5 + Speedbojen)"
    ausrichtung: hoch
    bild: alcatraz_Parcours
    summeSpalte: sum
    disq: alle
    hinweis: blickrichtung
    spalten:
      - { key: t2a, label: "Tor 2", typ: boje, sub: ["hin seiteA", "hin seiteB"] }
      - { key: t4a, label: "Tor 4", typ: boje, sub: ["hin seiteA", "hin seiteB"] }
      - { key: t5, label: "Tor 5", typ: boje, sub: ["hin seiteA", "rueck seiteA"] }
      - { key: t4b, label: "Tor 4", typ: boje, sub: ["rueck seiteA", "rueck seiteB"] }
      - { key: t2b, label: "Tor 2", typ: boje, sub: ["rueck seiteA", "rueck seiteB"] }
      # Speed nur je Klasse: Klasse 5/6 eine Boje, Klasse 7 zwei, darunter keine.
      - { key: speed1, label: "Speed 1", typ: boje, klassen: [5, 6, 7] }
      - { key: speed2, label: "Speed 2", typ: boje, klassen: [7] }
      - { key: disq, label: "Disq.", typ: disq }
      - { key: sum, label: "Σ", typ: summe }